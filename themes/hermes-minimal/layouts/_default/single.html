{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
       · {{ .Params.author | default $.Site.Params.author }}
    </div>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
